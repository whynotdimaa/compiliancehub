services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./app:/code/app
      - ./alembic:/code/alembic
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.core.celery_app.celery worker -Q ingestion,graph,notifications -l info --concurrency=2
    env_file: .env
    volumes:
      - ./app:/code/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      POSTGRES_DB: compliancehub
    ports:
      - "5433:5432"   # 5433 on the host: avoids clashing with a native PostgreSQL
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliancehub"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: compliance
      RABBITMQ_DEFAULT_PASS: compliance
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5.23-community
    environment:
      NEO4J_AUTH: neo4j/compliance123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: compliance
      MINIO_ROOT_PASSWORD: compliance123
    ports:
      - "9000:9000"
      - "9001:9001"   # console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  rabbitmq_data:
  redis_data:
  neo4j_data:
  minio_data:
