name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests alembic scripts
      - name: Unit tests
        run: pytest tests -q --ignore=tests/integration --cov=app --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: compliance
          POSTGRES_PASSWORD: compliance
          POSTGRES_DB: compliancehub
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U compliance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Create non-superuser app role
        env:
          PGPASSWORD: compliance
        run: psql -h localhost -U compliance -d compliancehub -f docker/postgres-init/01-app-user.sql
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql+asyncpg://compliance:compliance@localhost:5432/compliancehub
        run: alembic upgrade head
      - name: RLS integration tests
        env:
          # app_user, not the superuser: superusers bypass RLS
          DATABASE_URL: postgresql+asyncpg://app_user:app_password@localhost:5432/compliancehub
          RUN_INTEGRATION: "1"
        run: pytest tests/integration -q -m integration
